name: Auto Push Ijo Ijo Full

on:
  workflow_dispatch:
    inputs:
      commits_per_day:
        description: "Jumlah commit per hari (intensitas hijau)"
        required: false
        default: "25"
      delay_ms:
        description: "Delay antar push (milidetik)"
        required: false
        default: "150"
      email:
        description: "Email GitHub verified (contoh: nama@gmail.com)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  push-ijo-full:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git
        run: |
          USER_EMAIL="${{ github.event.inputs.email }}"
          if [ -z "$USER_EMAIL" ]; then
            USER_EMAIL=$(git log -1 --pretty=format:'%ae' 2>/dev/null || echo "${{ github.actor }}@users.noreply.github.com")
          fi
          git config user.name "${{ github.actor }}"
          git config user.email "$USER_EMAIL"
          echo "Using email: $USER_EMAIL"

      - name: Generate and push commits
        env:
          COMMITS_PER_DAY: ${{ github.event.inputs.total_commits || '25' }}
          DELAY_MS: ${{ github.event.inputs.delay_ms || '150' }}
        run: |
          python3 << 'PY'
          import os
          import random
          import subprocess
          import time
          from datetime import datetime, timedelta

          commits_per_day = int(os.environ.get("COMMITS_PER_DAY", "25"))
          delay_ms = int(os.environ.get("DELAY_MS", "150"))
          delay_sec = delay_ms / 1000

          def sh(cmd, env=None):
              result = subprocess.run(cmd, shell=True, capture_output=True, text=True, env=env)
              return result

          start = datetime(2018, 1, 1, 0, 0, 0)
          end = datetime.now()
          total_days = (end - start).days + 1

          commit_counter = 0

          for day_offset in range(total_days):
              current_date = start + timedelta(days=day_offset)
              waktu_display = current_date.strftime("%H:%M × %d/%m/%Y")

              for c in range(commits_per_day):
                  commit_counter += 1
                  
                  readme_content = f"PUSH KE #{commit_counter}\nWAKTU : {waktu_display}\n"

                  with open("README.md", "w", encoding="utf-8") as f:
                      f.write(readme_content)

                  sh("git add README.md")

                  env = os.environ.copy()
                  random_hour = random.randint(8, 22)
                  random_minute = random.randint(0, 59)
                  random_second = random.randint(0, 59)
                  full_date = current_date.replace(hour=random_hour, minute=random_minute, second=random_second)
                  full_date_str = full_date.strftime("%Y-%m-%d %H:%M:%S")
                  
                  env["GIT_AUTHOR_DATE"] = full_date_str
                  env["GIT_COMMITTER_DATE"] = full_date_str

                  commit_msg = f"PUSH #{commit_counter} | WAKTU : {waktu_display}"

                  commit_result = sh(f'git commit -m "{commit_msg}"', env=env)

                  if commit_result.returncode == 0:
                      push_result = sh("git push origin HEAD:main --force", env=env)
                      if push_result.return_code == 0:
                          print(f"[ #{commit_counter} ] PUSH IJO IJO DONE!!")
                      else:
                          print(f"[ #{commit_counter} ] PUSH IJO IJO GAGAL:v (push failed)")
                  else:
                      print(f"[ #{commit_counter} ] PUSH IJO IJO GAGAL:v (commit failed)")

                  time.sleep(delay_sec)

          print(f"\n\n=== TOTAL COMMITS: {commit_counter} ===")

          PY
